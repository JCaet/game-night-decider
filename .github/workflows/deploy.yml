name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      sync_secrets:
        description: 'Sync GitHub secret values to Secret Manager before deploying'
        type: boolean
        default: false
      sync_bot_config:
        description: 'Sync Telegram bot configuration after deploying'
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to deploy'
        type: string
        required: false
        default: ''
      sync_secrets:
        description: 'Sync GitHub secret values to Secret Manager before deploying'
        type: boolean
        required: false
        default: false
      sync_bot_config:
        description: 'Sync Telegram bot configuration after deploying'
        type: boolean
        required: false
        default: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: game-night-decider
  REGION: us-central1

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
          token_format: 'access_token'

      - name: Docker Login to Artifact Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build and Push Container
        run: |
          IMAGE_TAG=${{ inputs.ref || github.sha }}
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME:$IMAGE_TAG .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME:$IMAGE_TAG

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv sync --frozen && uv run alembic upgrade head

      - name: Sync secrets to Secret Manager
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.sync_secrets) || (github.event_name == 'workflow_call' && inputs.sync_secrets) }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
        run: |
          set -euo pipefail
          sync_secret() {
            local name="$1"
            local value="$2"
            local prev
            prev=$(gcloud secrets versions list "$name" --project="$PROJECT_ID" \
              --filter="state=ENABLED" --format="value(name)" --sort-by="~createTime")
            printf '%s' "$value" | gcloud secrets versions add "$name" \
              --project="$PROJECT_ID" --data-file=-
            for v in $prev; do
              gcloud secrets versions destroy "$v" --secret="$name" \
                --project="$PROJECT_ID" --quiet || true
            done
          }
          sync_secret gnd-telegram-token "$TELEGRAM_BOT_TOKEN"
          sync_secret gnd-webhook-secret "$WEBHOOK_SECRET"
          sync_secret gnd-database-url "$DATABASE_URL"
          sync_secret gnd-bgg-api-token "$BGG_API_TOKEN"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ inputs.ref || github.sha }}
          env_vars: |
            WEBHOOK_URL=${{ vars.WEBHOOK_URL }}
          secrets: |
            TELEGRAM_BOT_TOKEN=gnd-telegram-token:latest
            WEBHOOK_SECRET=gnd-webhook-secret:latest
            DATABASE_URL=gnd-database-url:latest
            BGG_API_TOKEN=gnd-bgg-api-token:latest
          flags: |
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=3
            --concurrency=40
            --timeout=30s
            --cpu-boost
            --allow-unauthenticated

      - name: Smoke test
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' "${{ vars.WEBHOOK_URL }}/telegram")
          echo "Webhook endpoint returned HTTP $status"
          if [ "$status" -ge 500 ]; then
            echo "::error::Smoke test failed — webhook endpoint returned $status"
            exit 1
          fi

      - name: Clean up old container images
        run: |
          gcloud artifacts docker images list \
            us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME \
            --sort-by="~UPDATE_TIME" \
            --format="get(DIGEST)" \
            --limit=999 | tail -n +2 | while read -r digest; do
              gcloud artifacts docker images delete \
                us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME@$digest \
                --quiet --delete-tags
          done

      - name: Sync Bot Configuration
        if: ${{ inputs.sync_bot_config }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: uv run scripts/sync_bot_config.py
