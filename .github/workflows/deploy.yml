name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      sync_secrets:
        description: 'Sync GitHub secret values to Secret Manager before deploying'
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to deploy'
        type: string
        required: false
        default: ''
      sync_secrets:
        description: 'Sync GitHub secret values to Secret Manager before deploying'
        type: boolean
        required: false
        default: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: game-night-decider
  REGION: us-central1

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
          token_format: 'access_token'

      - name: Docker Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build and Push Container
        run: |
          IMAGE_TAG=${{ inputs.ref || github.sha }}
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME:$IMAGE_TAG .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME:$IMAGE_TAG

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv sync --frozen && uv run alembic upgrade head

      - name: Sync secrets to Secret Manager
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.sync_secrets) || (github.event_name == 'workflow_call' && inputs.sync_secrets) }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
        run: |
          set -euo pipefail
          sync_secret() {
            local name="$1"
            local value="$2"
            printf '%s' "$value" | gcloud secrets versions add "$name" \
              --project="$PROJECT_ID" --data-file=-
          }
          sync_secret gnd-telegram-token "$TELEGRAM_BOT_TOKEN"
          sync_secret gnd-webhook-secret "$WEBHOOK_SECRET"
          sync_secret gnd-database-url "$DATABASE_URL"
          sync_secret gnd-bgg-api-token "$BGG_API_TOKEN"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ inputs.ref || github.sha }}
          env_vars: |
            WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
          secrets: |
            TELEGRAM_BOT_TOKEN=gnd-telegram-token:latest
            WEBHOOK_SECRET=gnd-webhook-secret:latest
            DATABASE_URL=gnd-database-url:latest
            BGG_API_TOKEN=gnd-bgg-api-token:latest
          flags: |
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=3
            --concurrency=40
            --timeout=30s
            --cpu-boost
            --allow-unauthenticated

      - name: Clean up old container images
        run: |
          gcloud artifacts docker images list \
            us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME \
            --sort-by="~UPDATE_TIME" \
            --format="get(DIGEST)" \
            --limit=999 | tail -n +2 | while read -r digest; do
              gcloud artifacts docker images delete \
                us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/$SERVICE_NAME@$digest \
                --quiet --delete-tags
          done

      - name: Sync Bot Configuration
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: uv run scripts/sync_bot_config.py
