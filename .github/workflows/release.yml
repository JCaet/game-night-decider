name: Release

on:
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      released: ${{ steps.detect.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release
        id: semantic
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: semantic-release version --changelog

      - name: Detect release
        id: detect
        run: |
          if git tag --points-at HEAD | grep -q '^v[0-9]'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: release
    if: |
      always() &&
      needs.release.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.release.outputs.released == 'true')
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ needs.release.outputs.released == 'true' && format('v{0}', needs.release.outputs.version) || '' }}
    secrets: inherit
